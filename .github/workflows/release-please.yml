name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (skip release-please)"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Enable auto-merge on Release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --merge
          echo "Auto-merge enabled on PR #$PR_NUMBER"

  publish:
    needs: [release-please]
    if: >-
      always() &&
      (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm publish --access public

      - name: Publish to MCP Registry
        continue-on-error: true
        run: |
          npm install -g mcp-publisher
          mcp-publisher login github-oidc
          mcp-publisher publish
